<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario DS-160</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo/logo.jpg">
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Formulario DS-160</h1>
    <p class="subtitle">Complete todos los campos requeridos</p>

    <form class="form-grid">

      <!-- DATOS PERSONALES -->
      <div class="section">
        <h2>Datos Personales</h2>
        <label>Nombre completo:<input type="text" /></label>
        <label>Estado civil:<input type="text" /></label>
        <label>Dirección casa:<input type="text" /></label>
        <label>Teléfono personal:<input type="text" /></label>
        <label>Teléfono residencial:<input type="text" /></label>
        <label>Teléfono laboral:<input type="text" /></label>
        <label>Correo electrónico:<input type="email" /></label>
      </div>

      <!-- REDES SOCIALES -->
      <div class="section">
        <h2>Redes Sociales</h2>
        <label>Facebook:<input type="text" /></label>
        <label>Instagram:<input type="text" /></label>
      </div>

      <!-- LABORAL -->
      <div class="section">
        <h2>Información Laboral</h2>
        <label>Empresa donde labora:<input type="text" /></label>
        <label>Cargo:<input type="text" /></label>
        <label>Fecha de inicio (día, mes, año):<input type="text" /></label>
        <label>Sueldo total mensual:<input type="number" /></label>
        <label>Dirección laboral:<input type="text" /></label>
      </div>

      <!-- CONTACTO EN USA -->
      <div class="section">
        <h2>Contacto en USA</h2>
        <label>Nombre completo:<input type="text" /></label>
        <label>Teléfono:<input type="text" /></label>
        <label>Dirección:<input type="text" /></label>
        <label>Email:<input type="email" /></label>
        <label>Parentesco:<input type="text" /></label>
      </div>

      <!-- VIAJE -->
      <div class="section">
        <h2>Plan de Viaje</h2>
        <label>Fecha de entrada y salida:<input type="text" /></label>
        <label>Países visitados en últimos 5 años:<input type="text" /></label>
      </div>

      <!-- PAREJA -->
      <div class="section">
        <h2>Pareja / Esposo(a)</h2>
        <label>Nombre completo:<input type="text" /></label>
        <label>Lugar de nacimiento:<input type="text" /></label>
        <label>Fecha de nacimiento:<input type="text" /></label>
      </div>

      <!-- PADRES -->
      <div class="section">
        <h2>Información de Padres</h2>
        <label>Nombre del padre:<input type="text" /></label>
        <label>Fecha de nacimiento:<input type="text" /></label>
        <label>Estatus migratorio del padre:<input type="text" /></label>
        <label>Nombre de la madre:<input type="text" /></label>
        <label>Fecha de nacimiento:<input type="text" /></label>
        <label>Estatus migratorio de la madre:<input type="text" /></label>
      </div>

      <!-- FAMILIA EN USA -->
      <div class="section">
        <h2>Familiares en USA</h2>
        <label>Nombre completo:<input type="text" /></label>
        <label>Parentesco:<input type="text" /></label>
        <label>Estatus migratorio:<input type="text" /></label>
      </div>

      <!-- OTROS -->
      <div class="section">
        <h2>Otros Datos</h2>
        <label>¿Ha solicitado visa de residente?:<input type="text" /></label>
        <label>Nombre del solicitante:<input type="text" /></label>
        <label>¿Le han negado visa?:<input type="text" /></label>
        <label>¿Manejo de armas de fuego?:<input type="text" /></label>
      </div>

      <!-- EDUCACIÓN -->
      <div class="section">
        <h2>Estudios</h2>
        <label>Nivel de estudios:<input type="text" /></label>
        <label>Centro de estudios:<input type="text" /></label>
        <label>Título obtenido:<input type="text" /></label>
        <label>Fecha inicio y graduación:<input type="text" /></label>
      </div>

      <!-- TRABAJO ANTERIOR -->
      <div class="section">
        <h2>Trabajo Anterior</h2>
        <label>Empresa:<input type="text" /></label>
        <label>Dirección y teléfono:<input type="text" /></label>
        <label>Supervisor inmediato:<input type="text" /></label>
        <label>Cargo desempeñado:<input type="text" /></label>
        <label>Sueldo:<input type="number" /></label>
        <label>Fecha inicio y fin:<input type="text" /></label>
      </div>

      <button type="submit" class="submit-btn">Enviar</button>
    </form>
  </div>
</body>
</html>
